service: letter-generator-app

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  memorySize: 512
  timeout: 30
  deploymentBucket:
    name: letter-generator-app-johnwhalas
    serverSideEncryption: AES256
  apiGateway:
    binaryMediaTypes:
      - 'multipart/form-data'
      - 'application/octet-stream'
      - 'application/pdf'
  environment:
    LLM_PROVIDER: groq
    GEMINI_API_KEY: ${env:GEMINI_API_KEY}
    GROQ_API_KEY: ${env:GROQ_API_KEY}
    STORAGE_PATH: /tmp/storage
    S3_BUCKET: letter-generator-app-letters

functions:
  api:
    handler: backend/handler.handler
    events:
      - http:
          path: /letter-types
          method: get
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /letters
          method: get
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /generate
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /download-pdf
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /edit-letter
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /analyze-docx
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
          request:
            contentHandling: CONVERT_TO_BINARY
      - http:
          path: /enhance-docx
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /fill-docx
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false
      - http:
          path: /download-docx
          method: post
          cors:
            origins:
              - 'https://letter-generating-app.vercel.app'
              - 'http://localhost:3000'
              - 'http://localhost:5500'
            headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allowCredentials: false

plugins:
  - serverless-offline

package:
  patterns:
    - '!backend/node_modules/puppeteer/**'
    - '!backend/node_modules/.cache/**'
    - '!backend/storage/**'
    - '!**/*.test.js'
    - '!.kiro/**'
    - '!frontend/**'
    - '!*.md'
    - 'backend/templates/docx/**'
