service: letter-generator-app

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  memorySize: 512
  timeout: 30
  deploymentBucket:
    name: letter-generator-app-johnwhalas
    serverSideEncryption: AES256
  environment:
    LLM_PROVIDER: ${env:LLM_PROVIDER, 'gemini'}
    GEMINI_API_KEY: ${env:GEMINI_API_KEY, ''}
    GROQ_API_KEY: ${env:GROQ_API_KEY, ''}
    STORAGE_PATH: /tmp/storage

functions:
  api:
    handler: backend/handler.handler
    events:
      - http:
          path: /letter-types
          method: get
          cors: true
      - http:
          path: /generate
          method: post
          cors: true
      - http:
          path: /download-pdf
          method: post
          cors: true
      - http:
          path: /analyze-docx
          method: post
          cors: true
      - http:
          path: /enhance-docx
          method: post
          cors: true

plugins:
  - serverless-offline

package:
  patterns:
    - '!backend/node_modules/puppeteer/**'
    - '!backend/node_modules/.cache/**'
    - '!backend/storage/**'
    - '!**/*.test.js'
    - '!.kiro/**'
    - '!frontend/**'
    - '!*.md'
